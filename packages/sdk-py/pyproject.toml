[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "anote-sdk"
version = "1.0.0"
description = "Python SDK for the Anote AI assistant REST API"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
keywords = ["anote", "ai", "coding-assistant", "sdk", "anthropic"]
dependencies = [
  "httpx>=0.27.0",
  "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "respx>=0.21",
]

[project.urls]
Homepage = "https://github.com/anote-ai/Autonomous-Intelligence"
Repository = "https://github.com/anote-ai/Autonomous-Intelligence"

[tool.hatch.build.targets.wheel]
packages = ["anote_sdk"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
