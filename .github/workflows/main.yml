name: Run Unit Tests 

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'pyproject.toml'
      - '.pre-commit-config.yaml'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'pyproject.toml'
      - '.pre-commit-config.yaml'
      - '.github/workflows/**'

jobs:
  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node (Frontend)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --force

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm run test:ci -- src/redux/UserSlice.test.js

  backend:
    name: Backend Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend quality dependencies
        run: python -m pip install -r backend/requirements-ci.txt

      - name: Ruff
        run: ruff check backend/tests backend/api_endpoints/chat/handler.py backend/api_endpoints/documents/handler.py

      - name: MyPy
        run: mypy --explicit-package-bases backend/tests backend/api_endpoints/chat/handler.py backend/api_endpoints/documents/handler.py

      - name: Pytest Coverage
        run: pytest backend/tests

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [javascript, python]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild project
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3
