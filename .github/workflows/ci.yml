name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Python backend ────────────────────────────────────────────────────────────
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: packages/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: packages/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check .

      - name: Mypy type check
        run: mypy . --ignore-missing-imports

      - name: Run tests
        run: pytest tests/ -v --cov=. --cov-report=term-missing --cov-fail-under=80
        env:
          APP_ENV: test
          DB_HOST: localhost
          JWT_SECRET_KEY: test-secret

  # ── TypeScript packages ───────────────────────────────────────────────────────
  typescript:
    name: TypeScript (build + test)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build --workspaces

      - name: Run CLI tests
        run: npm test --workspace=packages/cli --if-present

      - name: Run SDK tests
        run: npm test --workspace=packages/sdk --if-present

  # ── VS Code extension ─────────────────────────────────────────────────────────
  vscode:
    name: VS Code extension (build)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Build VS Code extension
        run: npm run build --workspace=packages/vscode

  # ── Docs ──────────────────────────────────────────────────────────────────────
  docs:
    name: Docs (build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/docs

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MkDocs
        run: pip install mkdocs-material

      - name: Build docs
        run: mkdocs build --strict

  # ── All checks gate ───────────────────────────────────────────────────────────
  all-checks-passed:
    name: All checks passed
    needs: [backend, typescript, vscode, docs]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [["${{ needs.backend.result }}" == "success" && \
                "${{ needs.typescript.result }}" == "success" && \
                "${{ needs.vscode.result }}" == "success" && \
                "${{ needs.docs.result }}" == "success" ]]; then
            echo "All checks passed!"
          else
            echo "One or more checks failed"
            exit 1
          fi
